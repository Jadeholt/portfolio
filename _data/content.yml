# ===== About =====
about:
  sdm:
    intro: >-
      As an SAP Service Delivery Manager and Cloud Architect, I lead the strategic planning,
      governance, and operational execution of SAP service delivery for global enterprises.
      My work sits at the intersection between business and technology — managing vendor relationships
      with partners like Capgemini, CGI, and SAP, overseeing multi-million SEK budgets, and ensuring
      that service delivery models align with SAP RISE Private Cloud Edition standards and enterprise
      architecture principles. I develop Target Operating Models that bridge the gap from project
      delivery to steady-state operations, ensuring clear SLA ownership, structured R&R frameworks,
      and long-term operational sustainability.
    achievements:
      - Managed SAP service delivery budgets exceeding tens of millions SEK with 40+ team members at Alleima
      - Developed Target Operating Models for RISE transitions at Sandvik Coromant and Epiroc
      - Led architectural and service delivery decisions impacting RISE landscapes exceeding x00 million SEK annually
      - Member of the Steering Committee for Technology Team at Ernst & Young Sweden
      - Managed Application Management Service Delivery across Capgemini and CGI partnerships
      - Strategic planning and governance for SAP landscapes during organizational restructurings at Sandvik
      - "Co-Founder of EEP Capital LLC and EE Padel S.L — entrepreneurial leadership beyond consulting"
  basis:
    intro: >-
      As a Senior SAP Basis Consultant and Platform Architect, I bring deep technical expertise
      in SAP system administration, platform architecture, and infrastructure management.
      With hands-on experience across 450+ SAP systems, I specialize in SAP HANA operations,
      system migrations, portal technologies, SSO/security configurations, and RISE technical
      delivery. I operate across the full SAP technology stack — from Web AS JAVA/ABAP and
      Web Dispatcher to TREX, Solution Manager, NWDI, and CTS+ transport management.
      My work combines deep platform knowledge with architectural insight to ensure technically
      sound, supportable, and scalable SAP landscapes.
    achievements:
      - Managed and operated 450+ SAP systems daily at Basis Consulting hosting center
      - Led technical migration and data separation of 27 SAP systems in Sandvik carve-out project
      - "Implemented SAP MII on HANA — infrastructure setup, data migration, performance tuning"
      - Architected SAP Cloud Platform PoC with Azure AD integration and principal propagation
      - "Life Cycle Management across 29 SAP systems — hardware, OS/DB upgrades with minimal downtime"
      - "SAP Enterprise Portal expertise — upgrades, SSO (SPNego, Kerberos), NWDI, Federation Portal"
      - RISE platform architecture support combining hands-on Basis with architectural decision-making

